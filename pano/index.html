<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tavuklu Board</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.cdnfonts.com/css/takeover');

        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --accent: #FFD700;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
            --bg-light: #FAFAF8;
            --white: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-color: #fffcf9;
        }

        /* Layout & Container */
        #app {
            width: 100%;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            z-index: 1;
        }

        /* Header */
        header {
            position: absolute;
            top: 15px;
            left: 20px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .brand {
            font-family: 'Takeover', sans-serif;
            font-size: 22px;
            font-weight: 400;
            color: var(--primary);
            text-transform: lowercase;
            letter-spacing: 1px;
        }

        /* Clock */
        .clock {
            position: absolute;
            top: 15px;
            right: 20px;
            z-index: 10;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        /* QR Code Box */
        .qr-box {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--white);
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.1);
            z-index: 20;
            text-align: center;
        }

        .qr-img {
            width: 60px;
            height: 60px;
            display: block;
            margin-bottom: 5px;
        }

        .qr-text {
            font-size: 10px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.2;
        }

        /* Equalizer Animation */
        .equalizer {
            display: flex;
            align-items: flex-end;
            height: 20px;
            gap: 3px;
            margin-right: 4px;
        }
        
        .bar {
            width: 4px;
            background-color: #1DB954;
            border-radius: 2px;
            animation: equalize 1s infinite ease-in-out alternate;
        }
        
        .bar:nth-child(1) { height: 60%; animation-delay: -0.4s; }
        .bar:nth-child(2) { height: 100%; animation-delay: -0.2s; }
        .bar:nth-child(3) { height: 40%; animation-delay: -0.6s; }

        @keyframes equalize {
            0% { height: 30%; }
            100% { height: 100%; }
        }

        /* Weather Widget */
        .bottom-widgets {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }

        .weather-widget {
            background: var(--white);
            padding: 6px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            color: var(--text-dark);
            font-size: 16px;
        }

        /* Spotify Widget */
        .spotify-widget {
            background: var(--white);
            padding: 6px 15px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-dark);
            max-width: 280px;
            transition: opacity 0.3s ease;
        }

        .spotify-icon {
            color: #1DB954;
            font-size: 20px;
        }

        .spotify-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.2;
        }

        .spotify-song {
            font-size: 12px;
            font-weight: 800;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .spotify-artist {
            font-size: 10px;
            color: var(--text-gray);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        /* Slide Container */
        .slide-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px 30px;
        }

        /* Slide Transitions */
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transform: translate3d(30px, 0, 0);
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Prevent interaction during transition */
            will-change: transform, opacity;
        }

        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .slide.exit {
            opacity: 0;
            transform: translate3d(-30px, 0, 0);
        }

        /* --- SLIDE TYPE: PRODUCT (HERO) --- */
        .product-slide {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            padding: 0 20px;
        }

        .product-info {
            width: 45%;
        }

        .product-name {
            font-size: 36px;
            line-height: 1;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--text-dark);
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.5s ease 0.2s, opacity 0.5s ease 0.2s;
        }

        .slide.active .product-name {
            transform: translateY(0);
            opacity: 1;
        }

        .product-desc {
            font-size: 16px;
            color: var(--text-gray);
            margin-bottom: 15px;
            font-weight: 400;
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.5s ease 0.3s, opacity 0.5s ease 0.3s;
        }

        .slide.active .product-desc {
            transform: translateY(0);
            opacity: 1;
        }

        .product-price {
            font-size: 64px;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
            display: inline-block;
            position: relative;
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s, opacity 0.5s ease 0.4s;
        }

        .slide.active .product-price {
            transform: scale(1);
            opacity: 1;
        }

        .currency {
            font-size: 24px;
            vertical-align: super;
            opacity: 0.8;
        }

        .product-image-wrapper {
            width: 50%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .product-image-wrapper::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            z-index: -1;
            /* Animasyon kaldırıldı */
        }

        .product-img {
            width: 100%;
            max-height: 320px;
            object-fit: contain;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1));
            transform: scale(0.8) rotate(-5deg);
            opacity: 0;
            transition: transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s, opacity 0.7s ease 0.1s;
        }

        .slide.active .product-img {
            transform: scale(1.1) rotate(0deg);
            opacity: 1;
        }

        /* --- SLIDE TYPE: GRID (FLAVORS) --- */
        .grid-slide-container {
            text-align: center;
            width: 100%;
        }

        .section-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--primary);
            margin: 20px auto 0;
            border-radius: 10px;
        }

        .flavors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .flavor-card {
            background: var(--white);
            padding: 15px 10px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid transparent;
            transition: transform 0.3s ease;
        }
        
        .flavor-card.active-card { /* For staggering animation */
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
        }

        .flavor-icon {
            font-size: 28px;
            color: var(--primary);
            margin-bottom: 10px;
            background: rgba(255, 107, 53, 0.1);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .flavor-name {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* --- SLIDE TYPE: ADVANTAGE (COMBO) --- */
        .advantage-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        .combo-card {
            background: var(--white);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.08);
            position: relative;
            border-top: 4px solid var(--primary);
        }

        .combo-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2;
        }

        .combo-img {
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            background: #f0f0f0;
        }

        .combo-content {
            padding: 15px;
            text-align: center;
        }

        .combo-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .combo-desc {
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .combo-price {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
        }

        /* --- SLIDE TYPE: SLOGAN --- */
        .slogan-slide {
            text-align: center;
        }

        .slogan-text {
            font-size: 48px;
            font-weight: 800;
            line-height: 1.1;
            color: var(--text-dark);
            letter-spacing: -2px;
        }

        .slogan-highlight {
            color: var(--primary);
            display: block;
        }

        .slogan-sub {
            font-size: 18px;
            color: var(--text-gray);
            margin-top: 20px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Progress Bar */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 8px;
            background: var(--primary);
            width: 0%;
            transition: none; /* JS ile kontrol edilecek */
        }

        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo Slide */
        .big-logo {
            width: 320px;
            max-width: 80%;
            height: auto;
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: 0;
            background-image: url('../img/tavuklutavuk.png');
            background-size: 140px;
            background-repeat: repeat;
            transform: rotate(-45deg);
            opacity: 0.09;
            pointer-events: none;
            /* Hareketli animasyon kaldırıldı, sadece statik desen */
            transition: opacity 0.6s ease;
        }

        .bg-pattern.warp-speed {
            opacity: 0.2;
        }

        @keyframes scrollPattern {
            0% { background-position: 0 0; }
            100% { background-position: 700px 0; }
        }

    </style>
</head>
<body>

    <!-- Background Pattern -->
    <div class="bg-pattern"></div>

    <!-- Brand Header -->
    <header>
        <img src="../img/animasyonlu-logo.gif" alt="" style="height: 35px; width: auto;">
        <div class="brand">tavuklu.tr</div>
    </header>

    <div id="app">
        <div class="slide-container" id="slide-container">
            <!-- Slides rendered via JS -->
        </div>
        <div class="clock" id="clock">00:00</div>
        
        <!-- QR Code -->
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://tavuklu.tr/menu" alt="Menü QR" class="qr-img">
            <div class="qr-text">MENÜ İÇİN<br>TARATIN</div>
        </div>

        <div class="bottom-widgets">
            <!-- Weather Widget -->
            <div class="weather-widget" id="weather"><i class="fa-solid fa-sun" style="color: var(--primary);"></i> --°C</div>
            
            <!-- Spotify Widget -->
            <!-- <div class="spotify-widget" id="spotify">
                <i class="fa-brands fa-spotify spotify-icon"></i>
                <div class="equalizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
                <div class="spotify-info">
                    <div class="spotify-song" id="spotify-song">Tavuklu FM</div>
                    <div class="spotify-artist" id="spotify-artist">Lezzetli Müzik</div>
                </div>
            </div> -->
        </div>

        <div class="progress-bar" id="progress"></div>
    </div>

    <script>
        // --- Configuration ---
        const SLIDE_DURATION = 7000; // ms

        // --- Data ---
        const slides = [
            // 1. Hero Products
            {
                type: 'product',
                title: 'Tavuklu Tabak',
                price: '250',
                desc: 'Soslu tavuk, pesto soslu makarna ve salata',
                img: '/img/tabak.jpeg'
            },
            {
                type: 'product',
                title: 'Tombik Ekmek',
                price: '150',
                desc: 'Bol soslu, bol malzemeli',
                img: '/img/tombik_ekmek.png' // Using path from context
            },
            {
                type: 'product',
                img: '../video/1.webm'
            },
            // 3. More Hero Products
            {
                type: 'product',
                title: 'Yarım Ekmek',
                price: '150',
                desc: 'Klasik lezzet, hızlı servis',
                img: '/img/yarim_ekmek.png'
            },
            {
                type: 'product',
                title: 'Tam Ekmek',
                price: '230',
                desc: '200gr Tavuk ile efsane doyuruculuk',
                img: '/img/tam_ekmek.png' // Or img/tamekmek.jpg
            },
            {
                type: 'product',
                title: 'Gurme Tavuklu Burger',
                price: '290',
                desc: 'Kelle peyniri, sweet chili sos ve özel brioche ekmek',
                img: '/video/6.webm'
            },
            // 4. Popular Flavors
            {
                type: 'grid',
                title: 'En Çok Tercih Edilen Soslar',
                items: [
                    { name: 'Köri Soslu', icon: 'fa-bowl-rice' },
                    { name: 'Barbekü Soslu', icon: 'fa-fire' },
                    { name: 'Acı Soslu', icon: 'fa-pepper-hot' },
                    { name: 'Teriyaki Soslu', icon: 'fa-wind' } 
                ]
            },
            // 8. Logo Slide
            {
                type: 'logo',
                img: '../img/tavuklu.png'
            },
            // 5. Advantage Menu
            {
                type: 'advantage',
                title: 'Avantajlı Menüler',
                items: [
                    { title: 'Tabak Menü', desc: 'Tavuklu Tabak + Kutu İçecekler', price: '380', img: '/img/tabak-cola.png' },
                    { title: 'Tombik Menü', desc: 'Tombik Ekmek + Kutu İçecekler', price: '280', img: '/img/tombik-cola.png' },
                    { title: 'Tam Ekmek Menü', desc: 'Tam Ekmek + Kutu İçecekler', price: '370', img: '/img/tam-cola.png' }
                ]
            },
            // 6. Citir Tavuk
            {
                type: 'product',
                title: 'Çıtır Tavuklu Tabağı',
                price: '180',
                desc: 'Çıtır tavuk parçaları, patates kızartması',
                img: '/img/citir.webp'
            },
             // 7. Slogan
             {
                type: 'slogan',
                main: 'Tavuğun En İyi',
                highlight: 'HALİ',
                sub: 'KALİTEYİ TADIN'
            },
            // 9. Video
            {
                type: 'product',
                img: '../video/7.webm'
            },
        ];

        // --- Logic ---
        let currentIndex = 0;
        const container = document.getElementById('slide-container');
        const progressBar = document.getElementById('progress');
        let slideTimer;

        function renderSlide(slide) {
            let html = '';

            if (slide.type === 'product') {
                const isVideo = slide.img.endsWith('.webm') || slide.img.endsWith('.mp4');
                const mediaHtml = isVideo 
                    ? `<video src="${slide.img}" class="product-img" autoplay muted loop playsinline></video>`
                    : `<img src="${slide.img}" class="product-img" onerror="this.src='https://placehold.co/600x600/FF6B35/FFFFFF?text=${slide.title}'" alt="${slide.title}">`;

                if (slide.title || slide.price) {
                    html = `
                        <div class="product-slide">
                            <div class="product-info">
                                <div class="product-name">${slide.title || ''}</div>
                                <div class="product-desc">${slide.desc || ''}</div>
                                <div class="product-price"><span class="count-up" data-target="${slide.price || 0}">0</span><span class="currency">₺</span></div>
                            </div>
                            <div class="product-image-wrapper">
                                ${mediaHtml}
                            </div>
                        </div>
                    `;
                } else {
                    html = `
                        <div class="product-slide" style="justify-content: center;">
                            <div class="product-image-wrapper" style="width: 85%;">
                                ${mediaHtml}
                            </div>
                        </div>
                    `;
                }
            } else if (slide.type === 'grid') {
                html = `
                    <div class="grid-slide-container">
                        <div class="section-title">${slide.title}</div>
                        <div class="flavors-grid">
                            ${slide.items.map((item, idx) => `
                                <div class="flavor-card active-card" style="animation-delay: ${idx * 0.1}s">
                                    <div class="flavor-icon"><i class="fa-solid ${item.icon}"></i></div>
                                    <div class="flavor-name">${item.name}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (slide.type === 'advantage') {
                html = `
                    <div class="grid-slide-container" style="transform: scale(0.85); transform-origin: center;">
                        <div class="section-title" style="margin-bottom: 40px;">${slide.title}</div>
                        <div class="advantage-grid">
                            ${slide.items.map((item, idx) => `
                                <div class="combo-card active-card" style="animation-delay: ${idx * 0.1}s">
                                    <div class="combo-badge">Fırsat</div>
                                    <img src="${item.img}" class="combo-img" onerror="this.src='https://placehold.co/400x300/e5e5e5/333?text=Menu'">
                                    <div class="combo-content">
                                        <div class="combo-title">${item.title}</div>
                                        <div class="combo-desc">${item.desc}</div>
                                        <div class="combo-price"><span class="count-up" data-target="${item.price}">0</span><span style="font-size:22px">₺</span></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (slide.type === 'slogan') {
                html = `
                    <div class="slogan-slide">
                        <div class="slogan-text">
                            ${slide.main}
                            <span class="slogan-highlight">${slide.highlight}</span>
                        </div>
                        <div class="slogan-sub">${slide.sub}</div>
                    </div>
                `;
            } else if (slide.type === 'logo') {
                html = `
                    <div class="logo-slide">
                        <img src="${slide.img}" class="big-logo" alt="Tavuklu">
                    </div>
                `;
            }

            return html;
        }

        function updateSlide() {
            // Create new slide element
            const slideEl = document.createElement('div');
            slideEl.className = 'slide';
            slideEl.innerHTML = renderSlide(slides[currentIndex]);
            
            // Append and animate
            container.appendChild(slideEl);
            
            // Force reflow
            slideEl.offsetHeight;
            
            // Activate
            slideEl.classList.add('active');
            
            // Trigger count up animations after a short delay to sync with CSS transitions
            setTimeout(() => {
                runCountUpAnimations(slideEl);
            }, 500);

            // Remove old slides
            const oldSlides = document.querySelectorAll('.slide:not(:last-child)');
            oldSlides.forEach(el => {
                el.classList.remove('active');
                el.classList.add('exit');
                setTimeout(() => el.remove(), 800); // Remove after transition
            });

            // Progress Bar Animation (CSS bazlı)
            progressBar.style.transition = 'none';
            progressBar.style.width = '0%';
            void progressBar.offsetWidth; // Force reflow
            progressBar.style.transition = `width ${SLIDE_DURATION}ms linear`;
            progressBar.style.width = '100%';

        }

        function runCountUpAnimations(container) {
            container.querySelectorAll('.count-up').forEach(el => {
                const target = parseInt(el.getAttribute('data-target'));
                if (isNaN(target)) return;
                
                const duration = 1500; // 1.5 seconds
                let start = null;
                
                function step(timestamp) {
                    if (!start) start = timestamp;
                    const progress = Math.min((timestamp - start) / duration, 1);
                    const ease = 1 - Math.pow(1 - progress, 3); // Cubic ease out
                    
                    el.innerText = Math.floor(ease * target);
                    
                    if (progress < 1) window.requestAnimationFrame(step);
                    else el.innerText = target;
                }
                window.requestAnimationFrame(step);
            });
        }

        function startSlideshow() {
            updateSlide();
            slideTimer = setInterval(() => {
                currentIndex = (currentIndex + 1) % slides.length;
                updateSlide();
            }, SLIDE_DURATION);
        }

        // --- Clock ---
        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('tr-TR', {hour: '2-digit', minute:'2-digit'});
            const dateStr = now.toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', weekday: 'long' });
            
            // Tarih ve Saati birleştir
            document.getElementById('clock').innerHTML = `<span style="font-size: 0.7em; font-weight: 600; color: var(--text-gray); margin-right: 10px;">${dateStr}</span> ${timeStr}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- Weather ---
        async function updateWeather() {
            try {
                // Mustafakemalpaşa Coordinates
                const lat = 40.0368;
                const lon = 28.4086;
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                // WMO Weather Codes to FontAwesome Icons
                let icon = 'fa-sun';
                if (code === 1 || code === 2 || code === 3) icon = 'fa-cloud-sun';
                else if (code >= 45 && code <= 48) icon = 'fa-smog';
                else if (code >= 51 && code <= 67) icon = 'fa-cloud-rain';
                else if (code >= 71 && code <= 77) icon = 'fa-snowflake';
                else if (code >= 80 && code <= 82) icon = 'fa-cloud-showers-heavy';
                else if (code >= 95) icon = 'fa-bolt';
                
                document.getElementById('weather').innerHTML = `<i class="fa-solid ${icon}" style="color: var(--primary);"></i> ${temp}°C`;
            } catch (e) {
                console.error('Weather error:', e);
            }
        }
        updateWeather();
        setInterval(updateWeather, 1800000); // Update every 30 minutes

        // --- Spotify Widget (Demo) ---
        // Gerçek Spotify API entegrasyonu için backend servisi gereklidir.
        // Şimdilik demo amaçlı liste dönüyor.
        const spotifySongs = [
            { song: "Lezzetli Anlar", artist: "Tavuklu.tr" },
            { song: "Keyifli Yemekler", artist: "Tavuklu Mutfak" },
            { song: "Çıtır Çıtır", artist: "Gurme Lezzetler" },
            { song: "Acıktıran Sesler", artist: "Tavuklu FM" }
        ];
        
        function updateSpotify() {
            // Rastgele şarkı seçimi (Demo)
            const random = spotifySongs[Math.floor(Math.random() * spotifySongs.length)];
            // Animasyonlu geçiş
            const widget = document.getElementById('spotify');
            widget.style.opacity = 0;
            setTimeout(() => {
                document.getElementById('spotify-song').innerText = random.song;
                document.getElementById('spotify-artist').innerText = random.artist;
                widget.style.opacity = 1;
            }, 300);
        }
        
        // 5 dakikada bir şarkı değişiyormuş gibi yap
        setInterval(updateSpotify, 300000); 

        // Init
        startSlideshow();

    </script>
</body>
</html>
